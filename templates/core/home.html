{% extends "base.html" %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-4">
        <h1 class="display-5 fw-bold">Welcome to BoardGameHub</h1>
        <p class="col-md-8 fs-5">Discover board games, write reviews, and organize play events.</p>
        {% if user.is_authenticated %}
            <a class="btn btn-primary btn-lg" href="/accounts/profile/">View your profile</a>
        {% else %}
            <a class="btn btn-primary btn-lg" href="/accounts/register/">Create account</a>
        {% endif %}
    </div>
</div>
{% endblock %}
