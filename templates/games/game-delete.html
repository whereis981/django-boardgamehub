{% extends "base.html" %}

{% block content %}
<h2>Delete Board Game</h2>
<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <p class="text-danger">Are you sure you want to delete this game?</p>
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
</form>
{% endblock %}
