{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h2>Events</h2><a class="btn btn-success" href="/events/create/">Create Event</a></div>
{% for event in events %}
<div class="card p-3 mb-3 shadow-sm">
<h4>{{ event.title }}</h4>
<p>{{ event.description }}</p>
<a class="btn btn-primary" href="/events/{{ event.pk }}/">Details</a>
</div>
{% empty %}
<p>No events yet.</p>
{% endfor %}
{% endblock %}
